<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Trabalhando com listas</h1> <!--1 A a I i-->
    <h2>Listas ordenadas</h2>
    <ol type="1" start="1">
        <li>Acordar</li>
        <li>Esovar os dentes</li>
        <li>Tomar cafe</li>
        <li>Sair</li>
    </ol>
    
    <h2>Not ordered lists</h2>
    <ul type="square"> <!--disc, circle, square-->
        <li>Bread</li>
        <li>Milk</li>
        <li>Tomato</li>
        <li>Butter</li>
        <li>Rice</li>
        <li>Beans</li>
    </ul>

    <dl>
        <dt>Term</dt>
        <dd>Description</dd>
        <dt>HTML</dt>
        <dd>Mark-language for web content creation.</dd>
        <dt>Java Script</dt>
    </dl>
</body>
</html>
