<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipografia CSS</title>
    <link rel="shortcut icon" href="../../desafios/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="meuEstilo.css?v=2">
</head>
<body>
    <header class="caixa">
        <div class="title">
            <img src="images/CSS3-logo.png" alt="Logo CSS">
            <h1>Tipografia em CSS</h1>
            <a href="index.html">    
                <img src="images/home.png" alt="Home" style="margin-left: -63cqh; height: 30px; width: auto; filter: blur(0);">
            </a>
        </div>
    </header>

    <main class="content ">
        <h1>O que é Tipografia?</h1>
        <div class="bloco">
            <p>A palavra tipografia vem do grego:</p>

            <div class="centralized lowVerticalMargin">
                <div class="horizontalAttach">
                    <div class="horTerm">
                        <p class="bigTerm">Tipo – Týpos</p>
                        <p class="comment">Impressão / Pôr coisas no papel</p>
                    </div>

                    <div class="divider"></div>

                    <div class="horTerm">
                        <p class="bigTerm">Grafia – Graphía</p>
                        <p class="comment">Escrita</p>
                    </div>
                </div>
            </div>

            <p class="boxShadow centralized italic" >"Estudo de como escrever coisas no papel"</p>
            <br>
            <div class="horizontalAttach">
                <div class="horTerm">
                    <img class="bigTerm imageMedium" src="https://thumbs.dreamstime.com/b/letras-velhas-da-m%C3%A1quina-impressora-alfabeto-grego-60236334.jpg" alt="Imagem Letras imprensa" >
                    <p class="comment">Exemplo de letras usadas<br>pela máquina de imprensa</p>
        
            </div>
        </div>
    </main>
</body>
</html>
