<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../desafios/favicon.ico" type="image/x-icon">
    <title>Hover Example</title>
    
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div:hover {
            color: red;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: white;
            background-color: red;
        }

    </style>
</head>
<body>
    <h1>Hover Example</h1>

    <p>
        Hover the mouse over the text bellow
    </p>
    <div>
        Hover your mouse here!

        <p>
            hidden text!! >:)
        </p>
    </div>
    <p>
        End of the example.
    </p>
</body>
</html>
