<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../desafios/favicon.ico" type="image/x-icon">
    <title>Links</title>

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }

        a {
            color: red;
            text-decoration: none;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            font-weight: bold;
        }

        a:active {
            color: rgba(119, 13, 13, 0.637);
            font-style: italic;
        }

        a::after {
            content: 'link';
            font-size: 1.3ch;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Personalizing Links</h1>

    <ul>
        <li>
            <a href="https://github.com/jungl4">
                GitHub Repository
            </a>
        </li>
        <li>
            <a href="https://www.youtube.com/@Jungl4">
                YouTube Channel
            </a>
        </li>
        <li>
            <a href="https://jeanbaialopes.myportfolio.com">
                JeanBaiaLopes Portifolio
            </a>
        </li>
    </ul>
</body>
</html>
